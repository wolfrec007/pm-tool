services:
  - type: web
    name: staffplan
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          - type: neon
            name: staffplan-db
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: SESSION_COOKIE_NAME
        value: staffplan_session
