{% if request.session.flash_message %}
<div class="uk-alert mb-4" uk-alert uk-close="">
    <p>{{ request.session.flash_message }}</p>
</div>
{% endif %}
{% if request.session.error_message %}
<div class="uk-alert uk-alert-destructive mb-4" uk-alert uk-close="">
    <p>{{ request.session.error_message }}</p>
</div>
{% endif %}
