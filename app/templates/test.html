<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franken UI Test</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/css/core.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/css/utilities.min.css">
    <style>
        :root {
            font-family: Inter, sans-serif;
            font-feature-settings: "liga" 1, "calt" 1;
        }
        @supports (font-variation-settings: normal) {
            :root { font-family: InterVariable, sans-serif; }
        }
    </style>
    <script>
        const htmlElement = document.documentElement;
        const __FRANKEN__ = JSON.parse(localStorage.getItem("__FRANKEN__") || "{}");
        if (__FRANKEN__.mode === "dark" || (!__FRANKEN__.mode && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            htmlElement.classList.add("dark");
        } else {
            htmlElement.classList.remove("dark");
        }
        htmlElement.classList.add(__FRANKEN__.theme || "uk-theme-zinc");
        htmlElement.classList.add(__FRANKEN__.radii || "uk-radii-md");
        htmlElement.classList.add(__FRANKEN__.shadows || "uk-shadows-sm");
        htmlElement.classList.add(__FRANKEN__.font || "uk-font-sm");
    </script>
</head>
<body class="bg-background text-foreground min-h-screen p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold">Franken UI Test</h1>
        
        <!-- Buttons -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Buttons</h2>
            <div class="flex flex-wrap gap-2">
                <button class="uk-btn uk-btn-primary">Primary</button>
                <button class="uk-btn uk-btn-secondary">Secondary</button>
                <button class="uk-btn uk-btn-default">Default</button>
                <button class="uk-btn uk-btn-destructive">Destructive</button>
                <button class="uk-btn uk-btn-ghost">Ghost</button>
            </div>
        </section>

        <!-- Inputs -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Form Inputs</h2>
            <div class="space-y-4 max-w-md">
                <div>
                    <label class="uk-form-label">Email</label>
                    <input type="email" class="uk-input" placeholder="you@example.com">
                </div>
                <div>
                    <label class="uk-form-label">Select</label>
                    <select class="uk-select">
                        <option>Option 1</option>
                        <option>Option 2</option>
                    </select>
                </div>
                <div>
                    <label class="uk-form-label">Textarea</label>
                    <textarea class="uk-textarea" rows="3" placeholder="Enter text..."></textarea>
                </div>
            </div>
        </section>

        <!-- Card -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Card</h2>
            <div class="uk-card uk-card-body">
                <h3 class="text-lg font-semibold">Card Title</h3>
                <p class="text-muted-foreground">This is a card with some content inside.</p>
            </div>
        </section>

        <!-- Alert -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Alerts</h2>
            <div class="space-y-2">
                <div class="uk-alert uk-alert-primary" uk-alert>
                    <p>Primary alert message</p>
                </div>
                <div class="uk-alert uk-alert-warning" uk-alert>
                    <p>Warning alert message</p>
                </div>
                <div class="uk-alert uk-alert-destructive" uk-alert>
                    <p>Destructive alert message</p>
                </div>
            </div>
        </section>

        <!-- Icons -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Icons (Lucide)</h2>
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex items-center gap-2">
                    <uk-icon icon="users" width="24" height="24"></uk-icon>
                    <span>users</span>
                </div>
                <div class="flex items-center gap-2">
                    <uk-icon icon="briefcase" width="24" height="24"></uk-icon>
                    <span>briefcase</span>
                </div>
                <div class="flex items-center gap-2">
                    <uk-icon icon="calendar" width="24" height="24"></uk-icon>
                    <span>calendar</span>
                </div>
                <div class="flex items-center gap-2">
                    <uk-icon icon="user-plus" width="24" height="24"></uk-icon>
                    <span>user-plus</span>
                </div>
                <div class="flex items-center gap-2">
                    <uk-icon icon="building" width="24" height="24"></uk-icon>
                    <span>building</span>
                </div>
            </div>
        </section>

        <!-- Dark Mode Toggle -->
        <section>
            <h2 class="text-xl font-semibold mb-4">Theme</h2>
            <button id="theme-toggle" class="uk-btn uk-btn-default">
                Toggle Dark Mode
            </button>
        </section>
    </div>

    <script>
        document.getElementById('theme-toggle')?.addEventListener('click', function() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            const __FRANKEN__ = JSON.parse(localStorage.getItem('__FRANKEN__') || '{}');
            
            if (isDark) {
                html.classList.remove('dark');
                __FRANKEN__.mode = 'light';
            } else {
                html.classList.add('dark');
                __FRANKEN__.mode = 'dark';
            }
            localStorage.setItem('__FRANKEN__', JSON.stringify(__FRANKEN__));
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/js/core.iife.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/franken-ui@2.1.2/dist/js/icon.iife.js"></script>
</body>
</html>
